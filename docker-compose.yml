services:
  dynamodb:
    image: 'amazon/dynamodb-local'
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    ports:
      - '8000:8000'
    networks:
      - icaa-shared

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    networks:
      - icaa-shared
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: locallocal
    networks:
      - icaa-shared
    command: server /data --console-address ":9001"

  minio-setup:
    depends_on:
      - minio
    image: minio/mc:latest
    networks:
      - icaa-shared
    entrypoint: /bin/sh -c
    command: >-
      "sleep 5 && mc alias set minio http://minio:9000 local locallocal && mc mb minio/icaa-assets || true && mc anonymous set download minio/icaa-assets || true"

  dynamo-setup-event-registration:
    depends_on:
      - dynamodb
    image: 'amazon/aws-cli'
    networks:
      - icaa-shared
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: bash
    command:
      - -c
      - |
        sleep 5
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --region us-east-1 \
          --table-name event-registration \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --global-secondary-indexes \
            '[
              {
                "IndexName": "GSI1",
                "KeySchema": [
                  {"AttributeName": "GSI1PK", "KeyType": "HASH"},
                  {"AttributeName": "GSI1SK", "KeyType": "RANGE"}
                ],
                "Projection": {
                  "ProjectionType": "ALL"
                }
              }
            ]' || true

  dynamo-setup-login:
    depends_on:
      - dynamodb
    image: 'amazon/aws-cli'
    networks:
      - icaa-shared
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: bash
    command:
      - -c
      - |
        sleep 5
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --region us-east-1 \
          --table-name login-api \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE || true

  dynamo-setup-assets-api:
    depends_on:
      - dynamodb
    image: 'amazon/aws-cli'
    networks:
      - icaa-shared
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: bash
    command:
      - -c
      - |
        sleep 5
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --region us-east-1 \
          --table-name assets-api \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE || true
        aws dynamodb update-time-to-live \
          --endpoint-url http://dynamodb:8000 \
          --region us-east-1 \
          --table-name assets-api \
          --time-to-live-specification 'Enabled=true, AttributeName=TTL' || true

  dynamo-setup-articles-api:
    depends_on:
      - dynamodb
    image: 'amazon/aws-cli'
    networks:
      - icaa-shared
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: bash
    command:
      - -c
      - |
        sleep 5
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --region us-east-1 \
          --table-name articles-api \
          --billing-mode PAY_PER_REQUEST \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --global-secondary-indexes \
            '[
              {
                "IndexName": "GSI1",
                "KeySchema": [
                  {"AttributeName": "GSI1PK", "KeyType": "HASH"},
                  {"AttributeName": "GSI1SK", "KeyType": "RANGE"}
                ],
                "Projection": {
                  "ProjectionType": "ALL"
                }
              }
            ]' || true

networks:
  icaa-shared:
    name: icaa-shared
